name: Build Prism APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      mc_version:
        description: 'Minecraft version'
        required: false
        default: '1.20.4'

env:
  MC_VERSION: ${{ github.event.inputs.mc_version || '1.20.4' }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download and patch Minecraft jar
        run: |
          chmod +x scripts/download_and_patch.sh
          ./scripts/download_and_patch.sh app/src/main/assets
        env:
          MC_VERSION: ${{ env.MC_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: prism-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: prism-release
          path: app/build/outputs/apk/release/*.apk
