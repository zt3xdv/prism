name: Build Prism APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Get LTW
        continue-on-error: true
        run: |
          mkdir -p app_pojavlauncher/libs
          wget -q https://github.com/PojavLauncherTeam/LTW/releases/latest/download/ltw-release.aar -O app_pojavlauncher/libs/ltw-release.aar || true

      - name: Get JRE from PojavLauncher APK
        run: |
          # Download the PojavLauncher APK which has JRE bundled
          wget -q https://github.com/PojavLauncherTeam/PojavLauncher/releases/download/gladiolus/PojavLauncher.apk -O /tmp/pojav.apk

          # Extract JRE components from APK assets
          cd /tmp && unzip -q pojav.apk "assets/components/*" -d extracted/ || true

          # Copy JRE components to our assets
          if [ -d "extracted/assets/components/jre" ]; then
            mkdir -p $GITHUB_WORKSPACE/app_pojavlauncher/src/main/assets/components/
            cp -r extracted/assets/components/jre $GITHUB_WORKSPACE/app_pojavlauncher/src/main/assets/components/jre
            echo "JRE 8 extracted"
          fi

          if [ -d "extracted/assets/components/jre-new" ]; then
            cp -r extracted/assets/components/jre-new $GITHUB_WORKSPACE/app_pojavlauncher/src/main/assets/components/jre-new
            echo "JRE 17 extracted"
          fi

          if [ -d "extracted/assets/components/jre-21" ]; then
            cp -r extracted/assets/components/jre-21 $GITHUB_WORKSPACE/app_pojavlauncher/src/main/assets/components/jre-21
            echo "JRE 21 extracted"
          fi

          echo "=== JRE components ==="
          ls -lhR $GITHUB_WORKSPACE/app_pojavlauncher/src/main/assets/components/ | head -20

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11"

      - name: Build LWJGL GLFW shim
        run: |
          chmod +x scripts/languagelist_updater.sh
          ./scripts/languagelist_updater.sh
          mkdir -p out
          gradle :jre_lwjgl3glfw:build --no-daemon

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Debug APK
        run: |
          gradle :app_pojavlauncher:assembleDebug --no-daemon
          cp app_pojavlauncher/build/outputs/apk/debug/*.apk out/prism-debug.apk

      - name: Upload Prism APK
        uses: actions/upload-artifact@v4
        with:
          name: prism-debug
          path: out/prism-debug.apk
